        // ===============================================

        async function enviarEmailAceptacion(turno) {
            console.log('📧 Intentando enviar email al turno:', turno.id);
            console.log('📧 DATOS COMPLETOS DEL TURNO:', turno);
            console.log('📧 Email destino:', turno.email_estudiante);
            
            // ⚠️ VALIDACIÓN MEJORADA: Verificar si hay email del estudiante
            if (!turno.email_estudiante || 
                turno.email_estudiante.trim() === '' || 
                turno.email_estudiante === 'null' || 
                turno.email_estudiante === 'undefined') {
                console.warn('⚠️ No hay email del estudiante registrado');
                console.warn('⚠️ Turno completo:', JSON.stringify(turno, null, 2));
                showNotification('✅ Turno aceptado. ⚠️ No se pudo enviar email: el estudiante no tiene correo registrado.', 'warning');
                return false;
            }
            
            try {
                // Formatear fecha y hora
                const fechaSolicitud = new Date(turno.created_at).toLocaleDateString('es-ES', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
                
                const horaSolicitud = new Date(turno.created_at).toLocaleTimeString('es-ES', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                
                // ✅ FIX CRÍTICO: Asegurar que to_email NO esté vacío

                const templateParams = {
                    to_email: emailDestino,
                    student_name: turno.nombre || 'Estudiante',
                    turno_numero: turno.numero_turno || 'N/A',
                    fecha_solicitud: fechaSolicitud,

                // Validación extra antes de enviar

        // ===============================================

        // ===============================================
        // CONFIGURACIÓN DE SUPABASE

        const SUPABASE_URL = 'https://hynubiwdlpkfzqgzahlp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5bnViaXdkbHBrZnpxZ3phaGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM2MDM1MzYsImV4cCI6MjA3OTE3OTUzNn0.xbiu1OVD9I8V_NYj0gem1zK5wICW_cXrxIoRRwQFbAg';

        const DECE_CREDENTIALS = {
            email: 'deceuepdcdece@uepdc.edu.ec',

        };

        // ===============================================
        // UTILIDADES DE HORA - ✅ CORREGIDO PARA ECUADOR
        // ===============================================
        const HoraUtils = {
            // ✅ CORREGIDO: Obtener hora actual de Ecuador (UTC-5) de forma precisa
            getHoraEcuador() {
                const ahora = new Date();
                
                // Método 1: Usar la zona horaria de Ecuador directamente
                try {
                    const opciones = { 
                        timeZone: 'America/Guayaquil', 
                        year: 'numeric', 
                        month: '2-digit', 
                        day: '2-digit',
                        hour: '2-digit', 
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    };
                    
                    const formateador = new Intl.DateTimeFormat('es-EC', opciones);
                    const partes = formateador.formatToParts(ahora);
                    
                    const valores = {};
                    partes.forEach(parte => {
                        if (parte.type !== 'literal') {
                            valores[parte.type] = parte.value;
                        }
                    });
                    
                    const horaEcuador = new Date(
                        parseInt(valores.year),
                        parseInt(valores.month) - 1,
                        parseInt(valores.day),
                        parseInt(valores.hour),
                        parseInt(valores.minute),
                        parseInt(valores.second)
                    );
                    
                    console.log('✅ Hora Ecuador calculada:', horaEcuador.toLocaleString('es-EC'));
                    return horaEcuador;
                    
                } catch (error) {
                    // Fallback: calcular manualmente
                    console.warn('⚠️ Usando fallback para hora Ecuador');
                    const utc = ahora.getTime() + (ahora.getTimezoneOffset() * 60000);
                    return new Date(utc + (-5 * 3600000));
                }
            },
            
            // Convertir hora como "10:30" a minutos desde medianoche
            horaAMinutos(hora) {
                const [h, m] = hora.split(':').map(Number);
                return h * 60 + m;
            },
            
            // Convertir minutos a formato "HH:MM"
            minutosAHora(minutos) {
                const h = Math.floor(minutos / 60);
                const m = minutos % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            },
            
            // Agregar minutos a una hora
            agregarMinutos(hora, minutos) {
                const minutosActual = this.horaAMinutos(hora);
                const nuevosMinutos = minutosActual + minutos;
                return this.minutosAHora(nuevosMinutos);
            },
            
            // Formatear a AM/PM
            formatearAMPM(hora) {
                const [h, m] = hora.split(':').map(Number);
                const ampm = h >= 12 ? 'p.m' : 'a.m';
                const hora12 = h % 12 || 12;
                return `${hora12}:${m.toString().padStart(2, '0')} ${ampm}`;
            },
            
            // Generar rango de 40 minutos
            generarRango(horaInicio) {
                const horaFin = this.agregarMinutos(horaInicio, 40);
                return `${this.formatearAMPM(horaInicio)} a ${this.formatearAMPM(horaFin)}`;
            },
            
            // ✅ FUNCIÓN CORREGIDA: Verificar si la cita ya TERMINÓ (hora de fin ya pasó)
            citaYaTermino(horaInicio) {
                const horaEcuador = this.getHoraEcuador();
                const horaActualMinutos = horaEcuador.getHours() * 60 + horaEcuador.getMinutes();
                
                // Calcular hora de FIN (inicio + 40 minutos)
                const horaInicioMinutos = this.horaAMinutos(horaInicio);
                const horaFinMinutos = horaInicioMinutos + 40;
                
                console.log(`⏰ Verificando si cita terminó:`, {
                    horaEcuadorCompleta: horaEcuador.toLocaleString('es-EC'),
                    horaActual24h: `${horaEcuador.getHours()}:${horaEcuador.getMinutes()}`,
                    horaActualMinutos: horaActualMinutos,
                    horaInicio: horaInicio,
                    horaInicioMinutos: horaInicioMinutos,
                    horaFinMinutos: horaFinMinutos,
                    yaTermino: horaActualMinutos >= horaFinMinutos
                });
                
                return horaActualMinutos >= horaFinMinutos;
            },
            
            // ✅ FUNCIÓN CORREGIDA: Verificar si la cita está EN PROCESO (entre inicio y fin)
            citaEnProceso(horaInicio) {
                const horaEcuador = this.getHoraEcuador();
                const horaActualMinutos = horaEcuador.getHours() * 60 + horaEcuador.getMinutes();
                
                const horaInicioMinutos = this.horaAMinutos(horaInicio);
                const horaFinMinutos = horaInicioMinutos + 40;
                
                const enProceso = horaActualMinutos >= horaInicioMinutos && horaActualMinutos < horaFinMinutos;
                
                console.log(`🔄 Verificando si cita EN PROCESO:`, {
                    horaEcuadorCompleta: horaEcuador.toLocaleString('es-EC'),
                    horaActual24h: `${horaEcuador.getHours()}:${horaEcuador.getMinutes()}`,
                    horaActualMinutos: horaActualMinutos,
                    horaInicio: horaInicio,
                    horaInicioMinutos: horaInicioMinutos,
                    horaFinMinutos: horaFinMinutos,
                    enProceso: enProceso
                });
                
                return enProceso;
            },
            
            // Extraer la hora de INICIO del rango "10:30 p.m a 11:10 p.m"
            extraerHoraInicio(rangoHora) {
                // Extraer la primera hora en formato 24h
                const match = rangoHora.match(/(\d{1,2}):(\d{2})\s*(a\.m|p\.m)/);
                if (!match) return null;
                
                let hora = parseInt(match[1]);
                const minutos = match[2];
                const periodo = match[3];
                
                // Convertir a formato 24h
                if (periodo === 'p.m' && hora !== 12) {
                    hora += 12;
                } else if (periodo === 'a.m' && hora === 12) {
                    hora = 0;
                }
                
                return `${hora.toString().padStart(2, '0')}:${minutos}`;
            }
        };

        // ===============================================

        // ===============================================
        const supabase = {
            from: (table) => ({
                select: async (columns = '*') => {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${columns}`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                    });
                    const data = await response.json();
                    return { data, error: response.ok ? null : data };
                },
                insert: async (values) => {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(values)
                    });
                    const data = await response.json();
                    return { data, error: response.ok ? null : data };
                },
                update: (values) => ({
                    eq: async (column, value) => {
                        const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${column}=eq.${value}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=representation'
                            },
                            body: JSON.stringify(values)
                        });
                        const data = await response.json();
                        return { data, error: response.ok ? null : data };
                    }
                }),
                delete: () => ({
                    eq: async (column, value) => {
                        const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${column}=eq.${value}`, {
                            method: 'DELETE',
                            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                        });
                        return { error: response.ok ? null : await response.json() };
                    }
                })
            })
        };

        // ===============================================
        // FUNCIONES DE DATOS - ✅ CORREGIDO LÓGICA DE AUTO-MARCADO
        // ===============================================
        
        // ✅ FUNCIÓN CORREGIDA: Verificar y actualizar estados de turnos según la hora
        async function verificarYActualizarEstadosTurnos(turnos) {
            for (const turno of turnos) {
                if (turno.estado === 'aceptado' && turno.hora_atencion_programada) {
                    // Extraer la hora de INICIO del rango
                    const horaInicio = HoraUtils.extraerHoraInicio(turno.hora_atencion_programada);
                    
                    if (!horaInicio) {
                        console.warn(`⚠️ No se pudo extraer hora de inicio del turno ${turno.id}`);
                        continue;
                    }
                    
                    // Verificar si la cita ya TERMINÓ (pasó la hora de fin)
                    if (HoraUtils.citaYaTermino(horaInicio)) {
                        console.log(`✅ Auto-marcando turno ${turno.id} como ATENDIDO (cita terminó)`);
                        await supabase.from('turnos').update({ 
                            estado: 'atendido',
                            hora_atencion: new Date().toISOString()
                        }).eq('id', turno.id);
                    }
                    // Verificar si la cita está EN PROCESO
                    else if (HoraUtils.citaEnProceso(horaInicio)) {
                        console.log(`🔄 Turno ${turno.id} está EN PROCESO`);
                        // Aquí podrías agregar un estado "en_proceso" si lo necesitas
                    }
                    else {
                        console.log(`⏰ Turno ${turno.id} aún no comienza (en espera)`);
                    }
                }
            }
        }
        
        async function cargarDatos() {
            try {
                // Cargar configuración
                const { data: config } = await supabase.from('configuracion').select('*');
                if (config && config.length > 0) {
                    const nuevoEstado = config[0].disponible;
                    if (state.estadoDECE.disponible !== nuevoEstado) {
                        state.estadoDECE = config[0];
                        actualizarEstadoDECEUI();
                    }
                }
                
                // Cargar turnos
                const { data: turnosData } = await supabase.from('turnos').select('*');
                if (turnosData) {
                    // ✅ Verificar y actualizar estados según la hora
                    await verificarYActualizarEstadosTurnos(turnosData);
                    
                    // Recargar después de actualizar
                    const { data: turnosActualizados } = await supabase.from('turnos').select('*');
                    const turnosOrdenados = turnosActualizados.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    
                    // Detectar cambios en los turnos
                    detectarCambiosTurnos(state.turnos, turnosOrdenados);
                    
                    state.turnos = turnosOrdenados;
                    calcularEstadisticas();
                    
                    // Actualizar solo las partes necesarias
                    if (state.vista === 'dece') {
                        actualizarEstadisticasUI();
                        actualizarListaTurnosUI();
                    }
                }
                
                // Actualizar mi turno si existe
                const miTurnoId = localStorage.getItem('miTurnoId');
                if (miTurnoId && turnosData) {
                    const turnoActualizado = state.turnos.find(t => t.id === parseInt(miTurnoId));
                    if (turnoActualizado) {
                        const estadoAnterior = state.miTurno?.estado;
                        state.miTurno = turnoActualizado;
                        
                        // Notificar al estudiante si su turno cambió de estado
                        if (state.vista === 'estudiante' && estadoAnterior && estadoAnterior !== turnoActualizado.estado) {
                            if (turnoActualizado.estado === 'aceptado') {
                                showNotification('¡Tu turno ha sido aceptado! 🎉', 'success');
                                verificarSiEsMiTurno();
                            } else if (turnoActualizado.estado === 'rechazado') {
                                showNotification('Tu turno fue rechazado. Revisa el motivo.', 'warning');
                            } else if (turnoActualizado.estado === 'atendido') {
                                showNotification('Tu cita ha sido completada ✅', 'success');
                            }
                        }
                        
                        if (state.vista === 'estudiante' && state.miTurno) {
                            actualizarMiTurnoUI();
                        }
                    } else {
                        state.miTurno = null;
                        localStorage.removeItem('miTurnoId');
                    }
                }
            } catch (error) {
                console.error('Error al cargar datos:', error);
            }
        }
        
        function detectarCambiosTurnos(turnosAnteriores, turnosNuevos) {
            const idsAnteriores = new Set(turnosAnteriores.map(t => t.id));
            const nuevos = turnosNuevos.filter(t => !idsAnteriores.has(t.id));
            
            if (nuevos.length > 0 && state.vista === 'dece') {
                showNotification(`${nuevos.length} nuevo${nuevos.length > 1 ? 's' : ''} turno${nuevos.length > 1 ? 's' : ''}`, 'info');
            }
        }
        
        function verificarSiEsMiTurno() {
            if (!state.miTurno || state.miTurno.estado !== 'aceptado') return;
            
            const turnosAceptadosAntes = state.turnos.filter(t => 
                t.estado === 'aceptado' && 
                t.numero_turno < state.miTurno.numero_turno
            ).length;
            
            if (turnosAceptadosAntes === 0) {
                // Verificar si ya llegó la hora de la cita
                if (state.miTurno.hora_atencion_programada) {
                    const horaInicio = HoraUtils.extraerHoraInicio(state.miTurno.hora_atencion_programada);
                    if (horaInicio && HoraUtils.citaEnProceso(horaInicio)) {
                        showNotification('🎉 ¡ES TU TURNO! Dirígete al DECE ahora', 'success');
                        playNotificationSound();
                    }
                }
            }
        }

        function calcularEstadisticas() {
            const hoy = new Date().toLocaleDateString('es-ES');
            const turnosHoy = state.turnos.filter(t => 
                new Date(t.created_at).toLocaleDateString('es-ES') === hoy
            );
            
            // Calcular cuántos están en proceso
            let enProceso = 0;
            state.turnos.forEach(t => {
                if (t.estado === 'aceptado' && t.hora_atencion_programada) {
                    const horaInicio = HoraUtils.extraerHoraInicio(t.hora_atencion_programada);
                    if (horaInicio && HoraUtils.citaEnProceso(horaInicio)) {
                        enProceso++;
                    }
                }
            });
            
            state.estadisticas = {
                totalHoy: turnosHoy.length,
                pendientes: state.turnos.filter(t => t.estado === 'pendiente').length,
                aceptados: state.turnos.filter(t => t.estado === 'aceptado').length,
                enProceso: enProceso,
                atendidos: state.turnos.filter(t => t.estado === 'atendido').length,
                rechazados: state.turnos.filter(t => t.estado === 'rechazado').length,
                no_asistio: state.turnos.filter(t => t.estado === 'no_asistio').length,
                tiempoPromedio: calcularTiempoPromedio()
            };
        }

        function calcularTiempoPromedio() {
            const turnosAtendidos = state.turnos.filter(t => t.estado === 'atendido' && t.hora_atencion);
            if (turnosAtendidos.length === 0) return 0;
            
            const tiempos = turnosAtendidos.map(t => {
                const inicio = new Date(t.created_at);
                const fin = new Date(t.hora_atencion);
                return (fin - inicio) / 1000 / 60;
            });
            
            return Math.round(tiempos.reduce((a, b) => a + b, 0) / tiempos.length);
        }

        function filtrarYBuscarTurnos() {
            let turnosFiltrados = state.filtroTurnos === 'todos' 
                ? state.turnos 
                : state.filtroTurnos === 'en_proceso'
                ? state.turnos.filter(t => {
                    if (t.estado === 'aceptado' && t.hora_atencion_programada) {
                        const horaInicio = HoraUtils.extraerHoraInicio(t.hora_atencion_programada);
                        return horaInicio && HoraUtils.citaEnProceso(horaInicio);
                    }
                    return false;
                })
                : state.turnos.filter(t => t.estado === state.filtroTurnos);
            
            if (state.busqueda) {

                turnosFiltrados = turnosFiltrados.filter(t => 
                    t.nombre.toLowerCase().includes(busqueda) ||
                    t.cedula.includes(busqueda) ||
                    t.curso.toLowerCase().includes(busqueda) ||
                    t.email_estudiante?.toLowerCase().includes(busqueda)
                );
            }
            
            return turnosFiltrados;
        }

        function loginEstudiante(email, password) {
            const usuarios = JSON.parse(localStorage.getItem('usuarios_estudiantes') || '[]');
            const usuario = usuarios.find(u => u.email === email && u.password === password);
            
            if (usuario) {
                state.usuarioActual = usuario;
                state.tipoUsuario = 'estudiante';
                state.vista = 'estudiante';
                localStorage.setItem('sesion', JSON.stringify({ tipo: 'estudiante', usuario }));
                
                cargarDatos().then(() => {
                    const miTurnoId = localStorage.getItem('miTurnoId');
                    if (miTurnoId) {
                        const turno = state.turnos.find(t => t.id === parseInt(miTurnoId));
                        if (turno) state.miTurno = turno;
                        else localStorage.removeItem('miTurnoId');
                    }
                    
                    // Cargar historial
                    state.historialEstudiante = state.turnos.filter(t => t.email_estudiante === email);
                    
                    render();
                    showNotification(`¡Bienvenido/a ${usuario.nombre}!`, 'success');
                });
                return true;
            }
            return false;
        }

        function registrarEstudiante(nombre, email, cedula, curso, password) {
            const usuarios = JSON.parse(localStorage.getItem('usuarios_estudiantes') || '[]');
            
            if (usuarios.find(u => u.email === email)) {
                showNotification('El correo ya está registrado', 'error');
                return false;
            }
            
            if (usuarios.find(u => u.cedula === cedula)) {
                showNotification('La cédula ya está registrada', 'error');
                return false;
            }
            
            const nuevoUsuario = { nombre, email, cedula, curso, password };
            usuarios.push(nuevoUsuario);
            localStorage.setItem('usuarios_estudiantes', JSON.stringify(usuarios));
            
            state.usuarioActual = nuevoUsuario;
            state.tipoUsuario = 'estudiante';
            state.vista = 'estudiante';
            localStorage.setItem('sesion', JSON.stringify({ tipo: 'estudiante', usuario: nuevoUsuario }));
            
            cargarDatos().then(() => {
                render();
                showNotification(`¡Registro exitoso! Bienvenido/a ${nombre}`, 'success');
            });
            return true;
        }

        async function registrarTurno(form) {
            if (!state.estadoDECE.disponible) {
                showNotification('El DECE no está disponible en este momento', 'warning');
                return false;
            }
            
            try {
                // ✅ Crear turno con email del usuario asegurado
                const nuevoTurno = {
                    nombre: form.nombre,
                    cedula: form.cedula,
                    curso: form.curso,
                    motivo: form.motivo,
                    situacion: form.situacion,
                    estado: 'pendiente',
                    numero_turno: state.turnos.length + 1,
                    email_estudiante: state.usuarioActual.email // ✅ Asegurar que el email se guarde
                };
                
                console.log('📝 Registrando turno con datos:', nuevoTurno);
                
                const { data, error } = await supabase.from('turnos').insert([nuevoTurno]);
                if (error) throw error;
                
                if (data && data.length > 0) {
                    localStorage.setItem('miTurnoId', data[0].id);
                    await cargarDatos();
                    
                    const turnoCreado = state.turnos.find(t => t.id === data[0].id);
                    if (turnoCreado) state.miTurno = turnoCreado;
                    
                    showNotification('¡Turno registrado exitosamente!', 'success');
                    render();
                    return true;
                }
            } catch (error) {
                console.error('Error completo:', error);
                showNotification('Error al registrar el turno: ' + error.message, 'error');
                return false;
            }
        }

        async function actualizarEstadoTurno(turnoId, nuevoEstado, motivoRechazo = null, horaProgramada = null, notaDECE = null) {
            try {
                const actualizado = { estado: nuevoEstado };
                if (motivoRechazo) actualizado.motivo_rechazo = motivoRechazo;
                if (horaProgramada) actualizado.hora_atencion_programada = horaProgramada;
                if (notaDECE) actualizado.nota_dece = notaDECE;
                if (nuevoEstado === 'atendido' || nuevoEstado === 'no_asistio') {
                    actualizado.hora_atencion = new Date().toISOString();
                }
                
                const { data, error } = await supabase.from('turnos').update(actualizado).eq('id', turnoId);
                if (error) throw error;
                
                // Enviar email si se acepta el turno
                if (nuevoEstado === 'aceptado') {
                    await cargarDatos(); // Recargar para obtener datos actualizados
                    const turnoActualizado = state.turnos.find(t => t.id === turnoId);
                    if (turnoActualizado) {
                        console.log('📧 Turno actualizado encontrado para enviar email:', turnoActualizado);
                        await enviarEmailAceptacion(turnoActualizado);
                    } else {
                        console.warn('⚠️ No se encontró el turno actualizado para enviar email');
                    }
                } else {
                    await cargarDatos();
                }
                
                const mensajes = {
                    'aceptado': '✅ Turno aceptado correctamente',
                    'rechazado': '❌ Turno rechazado',
                    'atendido': '✔️ Turno marcado como atendido',
                    'no_asistio': '🚫 Marcado como "No asistió"'
                };
                
                showNotification(mensajes[nuevoEstado] || 'Turno actualizado', 'success');
            } catch (error) {
                console.error('Error al actualizar turno:', error);
                showNotification('Error: ' + error.message, 'error');
            }
        }

            if (!confirm('¿Estás seguro de eliminar este turno?')) return;
            try {
                const { error } = await supabase.from('turnos').delete().eq('id', turnoId);

                await cargarDatos();
                showNotification('Turno eliminado', 'info');

        function renderMiTurnoContent() {
            const turno = state.miTurno;
            
            // Verificar si la cita está en proceso
            let estaEnProceso = false;
            if (turno.hora_atencion_programada) {
                const horaInicio = HoraUtils.extraerHoraInicio(turno.hora_atencion_programada);
                if (horaInicio) {
                    estaEnProceso = HoraUtils.citaEnProceso(horaInicio);
                }
            }
            
            const turnosEnCola = state.turnos.filter(t => 
                (t.estado === 'pendiente' || t.estado === 'aceptado')
            ).sort((a, b) => a.numero_turno - b.numero_turno);
            
            const miPosicion = turnosEnCola.findIndex(t => t.id === turno.id) + 1;
            const totalEnCola = turnosEnCola.length;
            
            const turnosAceptadosAntes = state.turnos.filter(t => 
                t.estado === 'aceptado' && 
                t.numero_turno < turno.numero_turno
            ).length;
            
            return `
                <div class="bg-white rounded-3xl shadow-2xl p-8 scale-in">
                    <h2 class="text-3xl font-bold text-gray-800 mb-6 flex items-center gap-3">
                        <span class="text-4xl">🎫</span> Mi Turno
                    </h2>
                    
                    ${(turno.estado === 'pendiente' || turno.estado === 'aceptado') ? `
                        <div class="gradient-bg text-white rounded-2xl p-10 text-center mb-6 shadow-2xl">

                            <div class="text-8xl font-black my-6">#${miPosicion}</div>

                            <div class="border-t-2 border-white/30 pt-6 mt-6 space-y-2">
                                <div class="text-lg">📅 ${new Date(turno.created_at).toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                                <div class="text-lg">⏰ ${new Date(turno.created_at).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}</div>
                                <div class="text-lg mt-4">👤 ${turno.nombre}</div>
                                <div class="text-lg">📚 ${turno.curso}</div>
                                <div class="text-lg mt-2">📋 ${turno.motivo}</div>
                            </div>
                        </div>
                    ` : `
                        <div class="gradient-bg text-white rounded-2xl p-10 text-center mb-6 shadow-2xl">
                            <div class="text-xl mb-3 font-semibold">Tu número de turno</div>
                            <div class="text-8xl font-black my-6">#${turno.numero_turno}</div>
                            <div class="text-xl">📅 ${new Date(turno.created_at).toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                            <div class="text-xl mt-2">⏰ ${new Date(turno.created_at).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}</div>
                            <div class="border-t-2 border-white/30 pt-6 mt-6 space-y-2">
                                <div class="text-xl">👤 ${turno.nombre}</div>
                                <div class="text-xl">📚 ${turno.curso}</div>
                                <div class="text-xl mt-2">📋 ${turno.motivo}</div>
                            </div>
                        </div>
                    `}
                    
                    ${estaEnProceso ? `
                        <div class="badge-en-proceso text-white p-8 rounded-2xl mb-6 text-center shadow-xl">
                            <div class="text-5xl mb-3">🔄</div>
                            <div class="font-black text-3xl mb-3">¡CITA EN PROCESO!</div>
                            <div class="text-xl font-semibold">El DECE te está atendiendo ahora</div>
                            ${turno.hora_atencion_programada ? `
                                <div class="mt-4 text-2xl font-black">
                                    🕐 ${turno.hora_atencion_programada}
                                </div>
                            ` : ''}
                        </div>

                        <div class="bg-gradient-to-r from-green-400 to-green-500 text-white p-8 rounded-2xl mb-6 text-center shadow-xl">

                            <div class="font-black text-3xl mb-3">¡ES TU TURNO!</div>

                                <div class="mt-4 text-2xl font-black">
                                    🕐 ${turno.hora_atencion_programada}
                                </div>
                            ` : ''}
                        </div>

                </div>
            `;

            return `

                if (horaInicio) {
                    estaEnProceso = HoraUtils.citaEnProceso(horaInicio);
                }
            }
            
            const colores = {

                    bg: 'from-yellow-50 to-yellow-100', 
                    border: 'border-yellow-500', 
                    badge: 'bg-yellow-500 text-white',
                    icon: '⏳'
                },
                aceptado: { 
                    bg: 'from-green-50 to-green-100', 
                    border: 'border-green-500', 
                    badge: estaEnProceso ? 'badge-en-proceso text-white' : 'bg-green-500 text-white',
                    icon: estaEnProceso ? '🔄' : '✅'

                rechazado: { 
                    bg: 'from-red-50 to-red-100', 
                    border: 'border-red-500',

                    border: 'border-gray-500',

                    icon: '🚫'

            };
            const c = colores[turno.estado] || colores.pendiente;

            return `
                <div class="bg-gradient-to-r ${c.bg} border-l-4 ${c.border} p-6 rounded-2xl shadow-lg turno-card smooth-update">
                    <div class="flex justify-between items-start flex-wrap gap-4 mb-4">
                        <div class="flex items-center gap-4">
                            <div class="gradient-bg text-white w-16 h-16 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg">

                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-3 text-sm mb-4">
                        <div class="bg-white p-3 rounded-lg">

                            <span class="text-gray-600">${turno.motivo}</span>

                            <span class="text-gray-600">${new Date(turno.created_at).toLocaleDateString('es-ES')} ${new Date(turno.created_at).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}</span>

                        ${turno.hora_atencion_programada ? `

                            </div>

                    </div>
                    
                    ${turno.situacion ? `
                        <div class="bg-white p-4 rounded-lg mb-4">

                    ${turno.motivo_rechazo ? `

        function attachLoginEvents() {
            const btnEstudiante = document.getElementById('btnEstudiante');
            const btnDECE = document.getElementById('btnDECE');
            const formContainer = document.getElementById('formContainer');

            btnEstudiante.addEventListener('click', () => {
                formContainer.innerHTML = renderFormEstudiante();
                attachFormEstudianteEvents();
            });

            btnDECE.addEventListener('click', () => {
                formContainer.innerHTML = renderFormDECE();
                attachFormDECEEvents();
            });
        }

        function attachFormEstudianteEvents() {
            const btnLoginEst = document.getElementById('btnLoginEst');
            const btnRegistroEst = document.getElementById('btnRegistroEst');
            const formEstudiante = document.getElementById('formEstudiante');

            btnLoginEst.addEventListener('click', () => {
                btnLoginEst.classList.add('border-b-4', 'border-blue-800', 'text-blue-800');
                btnRegistroEst.classList.remove('border-b-4', 'border-blue-800', 'text-blue-800');
                formEstudiante.innerHTML = renderLoginEstudiante();
                
                document.getElementById('loginEstForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const email = formData.get('email');
                    const password = formData.get('password');
                    
                    if (!loginEstudiante(email, password)) {
                        showNotification('Credenciales incorrectas', 'error');
                    }
                });
            });

            btnRegistroEst.addEventListener('click', () => {
                btnRegistroEst.classList.add('border-b-4', 'border-blue-800', 'text-blue-800');
                btnLoginEst.classList.remove('border-b-4', 'border-blue-800', 'text-blue-800');
                formEstudiante.innerHTML = renderRegistroEstudiante();
                
                document.getElementById('registroEstForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    registrarEstudiante(
                        formData.get('nombre'),
                        formData.get('email'),
                        formData.get('cedula'),
                        formData.get('curso'),
                        formData.get('password')
                    );
                });
            });

            btnLoginEst.click();
        }

        function attachFormDECEEvents() {
            document.getElementById('loginDECEForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const email = formData.get('email');
                const password = formData.get('password');
                
                if (!loginDECE(email, password)) {
                    showNotification('Credenciales DECE incorrectas', 'error');
                }
            });

            document.getElementById('btnVolverLogin').addEventListener('click', () => {
                document.getElementById('formContainer').innerHTML = '';
            });

        // Funciones globales
        window.cerrarSesion = cerrarSesion;
        window.cambiarDisponibilidad = cambiarDisponibilidad;
        window.eliminarTurno = eliminarTurno;
        window.agregarNotaDECE = agregarNotaDECE;
        
        window.refrescarManual = async () => {
            await cargarDatos();
            showNotification('Datos actualizados', 'info');
        };
        
        window.aceptarTurnoConHora = async (id) => {
            const hora = prompt('🕐 Ingrese la HORA DE INICIO de la cita:\n\nEjemplo: 10:00 o 14:30\n\n(Se generará automáticamente un rango de 40 minutos)');
            
            if (hora) {
                // Validar formato HH:MM
                if (!/^\d{1,2}:\d{2}$/.test(hora)) {
                    showNotification('⚠️ Formato inválido. Use HH:MM (ejemplo: 10:00)', 'error');
                    return;
                }
                
                // Generar rango automático de 40 minutos
                const rangoCompleto = HoraUtils.generarRango(hora);
                console.log('✅ Rango generado:', rangoCompleto);
                
                await actualizarEstadoTurno(id, 'aceptado', null, rangoCompleto);
            }
        };
        
        window.editarHora = async (id, horaActual) => {
            const hora = prompt('🕐 Modificar hora de atención:', horaActual);
            if (hora && hora !== horaActual) {
                try {
                    const { error } = await supabase.from('turnos').update({ hora_atencion_programada: hora }).eq('id', id);
                    if (error) throw error;
                    await cargarDatos();
                    showNotification('Hora actualizada correctamente', 'success');
                } catch (error) {
                    showNotification('Error: ' + error.message, 'error');
                }
            }
        };
        
        window.rechazarTurno = (id) => {
            const motivo = prompt('🚫 Motivo por el cual NO está disponible:\n\n(Ejemplo: Agenda llena, Derivar a otro servicio, Horario no disponible)');
            if (motivo) {
                actualizarEstadoTurno(id, 'rechazado', motivo);
            }
        };
        
        window.marcarAtendido = (id) => {
            if (confirm('¿Confirmar que este turno ha sido atendido?')) {
                actualizarEstadoTurno(id, 'atendido');
            }
        };
        
        // ✅ FUNCIÓN: Marcar como "No asistió"
        window.marcarNoAsistio = (id) => {
            if (confirm('¿Confirmar que el estudiante NO se presentó a la cita?')) {
                actualizarEstadoTurno(id, 'no_asistio');
            }
        };
        
        window.cerrarMiTurno = () => {
            state.miTurno = null;
            render();
        };
        
        window.verMiTurno = async () => {
            const miTurnoId = localStorage.getItem('miTurnoId');
            if (miTurnoId) {
                await cargarDatos();
                const turno = state.turnos.find(t => t.id === parseInt(miTurnoId));
                if (turno) {
                    state.miTurno = turno;
                    render();
                } else {
                    localStorage.removeItem('miTurnoId');
                    showNotification('Tu turno ya no está disponible', 'warning');
                    render();
                }
            }
        };
        
        window.volverInicio = () => {
            state.miTurno = null;
            localStorage.removeItem('miTurnoId');
            render();
        };
        
        window.filtrarTurnos = (filtro) => {
            state.filtroTurnos = filtro;
            actualizarListaTurnosUI();
        };
        
        window.buscarTurnos = (busqueda) => {
            state.busqueda = busqueda;
            actualizarListaTurnosUI();
        };
        
        window.toggleHistorial = () => {
            const container = document.getElementById('historialContainer');
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                container.innerHTML = renderHistorial();

                            </div>
                            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-8 rounded-xl">
                                <div class="flex items-start gap-4">
                                    <div class="text-5xl">⚠️</div>
                                    <div>
                                        <h3 class="font-bold text-yellow-800 mb-3 text-xl">Base de datos no configurada</h3>
                                        <p class="text-yellow-700 text-lg">Configure las credenciales de Supabase en el código</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            if (state.vista === 'login') {
                app.innerHTML = renderLogin();
                attachLoginEvents();
            } else if (state.vista === 'estudiante') {
                app.innerHTML = renderEstudiante();
                attachEstudianteEvents();
            } else if (state.vista === 'dece') {
                app.innerHTML = renderDECE();
                attachDECEEvents();
            }
        }

        // ===============================================
        // VERIFICAR SESIÓN E INICIALIZACIÓN
        // ===============================================
        function verificarSesion() {
            const sesion = localStorage.getItem('sesion');
            if (sesion) {
                const { tipo, usuario } = JSON.parse(sesion);
                state.tipoUsuario = tipo;
                state.vista = tipo;
                if (tipo === 'estudiante') {
                    state.usuarioActual = usuario;
                }
            }
        }

        // Auto-refresh SIN PARPADEO cada 5 segundos
        let refreshInterval;
        
        function iniciarAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            
            refreshInterval = setInterval(async () => {
                if (state.configurado && (state.vista === 'estudiante' || state.vista === 'dece')) {
                    await cargarDatos();
                }
            }, 5000);
        }

        // Inicialización
        async function init() {
            await verificarConfiguracion();
            verificarSesion();
            
            if (state.vista !== 'login') {
                await cargarDatos();
                
                if (state.vista === 'estudiante') {
                    const miTurnoId = localStorage.getItem('miTurnoId');
                    if (miTurnoId && state.turnos.length > 0) {
                        const turno = state.turnos.find(t => t.id === parseInt(miTurnoId));
                        if (turno) state.miTurno = turno;
                    }
                    
                    state.historialEstudiante = state.turnos.filter(t => 
                        t.email_estudiante === state.usuarioActual.email
                    );
                }
            }
            
            render();
            iniciarAutoRefresh();
        }

        init();
    </script>
</body>
</html>
