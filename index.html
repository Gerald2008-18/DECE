        // Estado de la aplicación
        let state = {
            vista: 'login',
            tipoUsuario: null,
            usuarioActual: null,
            configurado: false,
            estadoDECE: { disponible: true },
            turnos: [],
            miTurno: null
        };

        // Supabase client
        const supabase = {
            from: (table) => ({
                select: async (columns = '*') => {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${columns}`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                    });
                    const data = await response.json();
                    return { data, error: response.ok ? null : data };
                },
                insert: async (values) => {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(values)
                    });
                    const data = await response.json();
                    return { data, error: response.ok ? null : data };
                },
                update: (values) => ({
                    eq: async (column, value) => {
                        const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${column}=eq.${value}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=representation'
                            },
                            body: JSON.stringify(values)
                        });
                        const data = await response.json();
                        return { data, error: response.ok ? null : data };
                    }
                }),
                delete: () => ({
                    eq: async (column, value) => {
                        const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${column}=eq.${value}`, {
                            method: 'DELETE',
                            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                        });
                        return { error: response.ok ? null : await response.json() };
                    }
                })
            })
        };

        // Funciones de datos
        async function cargarDatos() {
            try {
                const { data: config } = await supabase.from('configuracion').select('*');
                if (config && config.length > 0) state.estadoDECE = config[0];
                
                const { data: turnosData } = await supabase.from('turnos').select('*');
                if (turnosData) {
                    state.turnos = turnosData.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                }
                
                const miTurnoId = localStorage.getItem('miTurnoId');
                if (miTurnoId && turnosData) {
                    const turnoActualizado = turnosData.find(t => t.id === parseInt(miTurnoId));
                    if (turnoActualizado) {
                        state.miTurno = turnoActualizado;
                    } else {
                        state.miTurno = null;
                        localStorage.removeItem('miTurnoId');
                    }
                }
            } catch (error) {
                console.error('Error al cargar datos:', error);
            }
        }

        async function verificarConfiguracion() {
            if (SUPABASE_URL === 'TU_SUPABASE_URL' || SUPABASE_KEY === 'TU_SUPABASE_ANON_KEY') {
                state.configurado = false;
                return;
            }
            try {
                const { error } = await supabase.from('configuracion').select('*');
                if (!error) {
                    state.configurado = true;
                    await cargarDatos();
                }
            } catch (err) {
                state.configurado = false;
            }
        }

        // Funciones de autenticación
        function loginEstudiante(email, password) {
            const usuarios = JSON.parse(localStorage.getItem('usuarios_estudiantes') || '[]');
            const usuario = usuarios.find(u => u.email === email && u.password === password);
            
            if (usuario) {
                state.usuarioActual = usuario;
                state.tipoUsuario = 'estudiante';
                state.vista = 'estudiante';
                localStorage.setItem('sesion', JSON.stringify({ tipo: 'estudiante', usuario }));
                
                cargarDatos().then(() => {
                    const miTurnoId = localStorage.getItem('miTurnoId');
                    if (miTurnoId) {
                        const turno = state.turnos.find(t => t.id === parseInt(miTurnoId));
                        if (turno) {
                            state.miTurno = turno;
                        } else {
                            localStorage.removeItem('miTurnoId');
                        }
                    }
                    render();
                });
                return true;
            }
            return false;
        }

        function registrarEstudiante(nombre, email, cedula, curso, password) {
            const usuarios = JSON.parse(localStorage.getItem('usuarios_estudiantes') || '[]');
            
            if (usuarios.find(u => u.email === email)) {
                alert('❌ El correo ya está registrado');
                return false;
            }
            
            const nuevoUsuario = { nombre, email, cedula, curso, password };
            usuarios.push(nuevoUsuario);
            localStorage.setItem('usuarios_estudiantes', JSON.stringify(usuarios));
            
            state.usuarioActual = nuevoUsuario;
            state.tipoUsuario = 'estudiante';
            state.vista = 'estudiante';
            localStorage.setItem('sesion', JSON.stringify({ tipo: 'estudiante', usuario: nuevoUsuario }));
            
            cargarDatos().then(() => {
                render();
            });
            return true;
        }

        function loginDECE(email, password) {
            if (email === DECE_CREDENTIALS.email && password === DECE_CREDENTIALS.password) {
                state.tipoUsuario = 'dece';
                state.vista = 'dece';
                localStorage.setItem('sesion', JSON.stringify({ tipo: 'dece' }));
                
                cargarDatos().then(() => {
                    render();
                });
                return true;
            }
            return false;
        }

        function cerrarSesion() {
            state.usuarioActual = null;
            state.tipoUsuario = null;
            state.vista = 'login';
            state.miTurno = null;
            localStorage.removeItem('sesion');
            localStorage.removeItem('miTurnoId');
            render();
        }

        // Funciones de turnos
        async function registrarTurno(form) {
            if (!state.estadoDECE.disponible) {
                alert('⚠️ El DECE no está disponible en este momento');
                return false;
            }
            
            try {
                const nuevoTurno = {
                    nombre: form.nombre,
                    cedula: form.cedula,
                    curso: form.curso,
                    motivo: form.motivo,
                    situacion: form.situacion,
                    estado: 'pendiente',
                    numero_turno: state.turnos.length + 1,
                    email_estudiante: state.usuarioActual.email
                };
                
                const { data, error } = await supabase.from('turnos').insert([nuevoTurno]);
                if (error) throw error;
                
                if (data && data.length > 0) {
                    localStorage.setItem('miTurnoId', data[0].id);
                    await cargarDatos();
                    
                    const turnoCreado = state.turnos.find(t => t.id === data[0].id);
                    if (turnoCreado) {
                        state.miTurno = turnoCreado;
                    }
                    
                    const posicion = state.turnos.filter(t => 
                        (t.estado === 'pendiente' || t.estado === 'aceptado')
                    ).length;
                    
                    alert(`✅ ¡Turno registrado exitosamente!\n\n📊 Posición en la fila: ${posicion} de ${posicion}\n\n⏳ Tu solicitud será revisada por el DECE pronto.`);
                    
                    render();
                    return true;
                }
            } catch (error) {
                console.error('Error completo:', error);
                alert('❌ Error al registrar el turno: ' + error.message);
                return false;
            }
        }

        async function cambiarDisponibilidad() {
            try {
                const nuevoEstado = !state.estadoDECE.disponible;
                const { error } = await supabase.from('configuracion').update({ disponible: nuevoEstado }).eq('id', state.estadoDECE.id);
                if (error) throw error;
                state.estadoDECE.disponible = nuevoEstado;
                render();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function actualizarEstadoTurno(turnoId, nuevoEstado, motivoRechazo = null) {
            try {
                const actualizado = { estado: nuevoEstado };
                if (motivoRechazo) actualizado.motivo_rechazo = motivoRechazo;
                if (nuevoEstado === 'atendido') actualizado.hora_atencion = new Date().toISOString();
                
                const { error } = await supabase.from('turnos').update(actualizado).eq('id', turnoId);
                if (error) throw error;
                await cargarDatos();
                render();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function eliminarTurno(turnoId) {
            if (!confirm('¿Estás seguro de eliminar este turno?')) return;
            try {
                const { error } = await supabase.from('turnos').delete().eq('id', turnoId);
                if (error) throw error;
                await cargarDatos();
                render();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Renderizado
        function render() {
            const app = document.getElementById('app');
            
            if (!state.configurado && state.vista === 'login') {
                app.innerHTML = renderConfiguracion();

            if (state.vista === 'login') {
                app.innerHTML = renderLogin();
                attachLoginEvents();
            } else if (state.vista === 'estudiante') {
                app.innerHTML = renderEstudiante();
                attachEstudianteEvents();
            } else if (state.vista === 'dece') {
                app.innerHTML = renderDECE();
                attachDECEEvents();
            }
        }

        function renderMiTurno() {
            const turno = state.miTurno;
            
            const turnosEnCola = state.turnos.filter(t => 
                (t.estado === 'pendiente' || t.estado === 'aceptado')
            ).sort((a, b) => a.numero_turno - b.numero_turno);
            
            const miPosicion = turnosEnCola.findIndex(t => t.id === turno.id) + 1;
            const totalEnCola = turnosEnCola.length;
            
            const turnosAceptadosAntes = state.turnos.filter(t => 
                t.estado === 'aceptado' && 
                t.numero_turno < turno.numero_turno
            ).length;
            
            return `
                <div class="bg-white rounded-2xl shadow-2xl p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">🎫 Mi Turno</h2>
                    
                    ${(turno.estado === 'pendiente' || turno.estado === 'aceptado') ? `

                            <div class="grid grid-cols-4 gap-4 text-center">
                                <div class="bg-gray-50 p-4 rounded-lg border-2 border-gray-300">
                                    <div class="text-2xl font-bold text-gray-700">${turnosHoy.length}</div>
                                    <div class="text-sm text-gray-600">Total hoy</div>

                                <div class="bg-yellow-50 p-4 rounded-lg border-2 border-yellow-300">
                                    <div class="text-2xl font-bold text-yellow-700">${turnosHoy.filter(t => t.estado === 'pendiente').length}</div>
                                    <div class="text-sm text-yellow-600">Pendientes</div>
                                </div>
                                <div class="bg-green-50 p-4 rounded-lg border-2 border-green-300">
                                    <div class="text-2xl font-bold text-green-700">${turnosHoy.filter(t => t.estado === 'aceptado').length}</div>
                                    <div class="text-sm text-green-600">En espera</div>
                                </div>
                                <div class="bg-blue-50 p-4 rounded-lg border-2 border-blue-300">
                                    <div class="text-2xl font-bold text-blue-700">${turnosHoy.filter(t => t.estado === 'atendido').length}</div>
                                    <div class="text-sm text-blue-600">Completados</div>

                        <div class="bg-white rounded-2xl shadow-2xl p-6">

        function renderSinTurnos() {
            return `
                <div class="text-center py-12 text-gray-500">
                    <div class="text-6xl mb-4">📋</div>
                    <div class="text-xl">No hay turnos registrados</div>
                    <p class="text-sm mt-2">Los turnos aparecerán aquí cuando los estudiantes los soliciten</p>
                </div>
            `;
        }

        function renderListaTurnos() {
            return `
                <div class="space-y-4">
                    ${state.turnos.map(turno => renderTurnoCard(turno)).join('')}
                </div>
            `;
        }

        function renderTurnoCard(turno) {
            const colores = {
                pendiente: { bg: 'bg-yellow-50', border: 'border-yellow-500', badge: 'bg-yellow-200 text-yellow-800' },
                aceptado: { bg: 'bg-green-50', border: 'border-green-500', badge: 'bg-green-200 text-green-800' },
                rechazado: { bg: 'bg-red-50', border: 'border-red-500', badge: 'bg-red-200 text-red-800' },
                atendido: { bg: 'bg-gray-50', border: 'border-gray-500', badge: 'bg-gray-200 text-gray-800' }
            };
            const c = colores[turno.estado];

            return `
                <div class="${c.bg} border-l-4 ${c.border} p-4 rounded-lg">
                    <div class="flex justify-between items-start flex-wrap gap-3 mb-3">
                        <div class="flex items-center gap-3">
                            <div class="bg-indigo-600 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg">
                                #${turno.numero_turno}
                            </div>
                            <div>
                                <div class="font-bold text-lg">${turno.nombre}</div>
                                <div class="text-sm text-gray-600">${turno.cedula} • ${turno.curso}</div>
                            </div>
                        </div>
                        <span class="${c.badge} px-3 py-1 rounded-full text-sm font-bold">
                            ${turno.estado.toUpperCase()}
                        </span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm mb-3">
                        <div><span class="font-semibold">Motivo:</span> ${turno.motivo}</div>
                        <div><span class="font-semibold">Fecha:</span> ${new Date(turno.created_at).toLocaleDateString('es-ES')} ${new Date(turno.created_at).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}</div>
                        ${turno.hora_atencion_programada ? `
                            <div class="col-span-2"><span class="font-semibold">🕐 Hora programada:</span> <span class="text-green-700 font-bold">${turno.hora_atencion_programada}</span></div>
                        ` : ''}
                    </div>
                    ${turno.situacion ? `
                        <div class="bg-white p-3 rounded mb-3 text-sm">
                            <span class="font-semibold">Situación:</span> ${turno.situacion}
                        </div>
                    ` : ''}
                    ${turno.motivo_rechazo ? `
                        <div class="bg-white p-3 rounded mb-3 text-sm border-l-2 border-red-500">
                            <span class="font-semibold text-red-700">Motivo de rechazo:</span> ${turno.motivo_rechazo}
                        </div>
                    ` : ''}
                    <div class="flex gap-2 flex-wrap">
                        ${renderBotonesTurno(turno)}
                    </div>
                </div>
            `;
        }

        function renderBotonesTurno(turno) {
            let botones = '';
            
            if (turno.estado === 'pendiente') {
                botones = `
                    <button onclick="aceptarTurnoConHora(${turno.id})" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition text-sm font-semibold">
                        ✅ Aceptar y Programar Hora
                    </button>
                    <button onclick="rechazarTurno(${turno.id})" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition text-sm font-semibold">
                        ❌ Rechazar
                    </button>
                `;
            }
            
            if (turno.estado === 'aceptado') {
                botones = `
                    <button onclick="marcarAtendido(${turno.id})" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm font-semibold">
                        ✔️ Marcar como Atendido
                    </button>
                    ${turno.hora_atencion_programada ? `
                        <button onclick="editarHora(${turno.id}, '${turno.hora_atencion_programada}')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition text-sm font-semibold">
                            🕐 Cambiar Hora (${turno.hora_atencion_programada})
                        </button>
                    ` : ''}
                `;
            }
            
            botones += `
                <button onclick="eliminarTurno(${turno.id})" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm font-semibold">
                    🗑️ Eliminar
                </button>
            `;
            
            return botones;
        }

        // Event handlers
        function attachLoginEvents() {
            const btnEstudiante = document.getElementById('btnEstudiante');
            const btnDECE = document.getElementById('btnDECE');
            const formContainer = document.getElementById('formContainer');

            btnEstudiante.addEventListener('click', () => {
                formContainer.innerHTML = renderFormEstudiante();
                attachFormEstudianteEvents();
            });

            btnDECE.addEventListener('click', () => {
                formContainer.innerHTML = renderFormDECE();
                attachFormDECEEvents();
            });
        }

        function attachFormEstudianteEvents() {
            const btnLoginEst = document.getElementById('btnLoginEst');
            const btnRegistroEst = document.getElementById('btnRegistroEst');
            const formEstudiante = document.getElementById('formEstudiante');

            btnLoginEst.addEventListener('click', () => {
                btnLoginEst.classList.add('border-b-2', 'border-purple-600', 'text-purple-600');
                btnRegistroEst.classList.remove('border-b-2', 'border-purple-600', 'text-purple-600');
                btnRegistroEst.classList.add('text-gray-600');
                formEstudiante.innerHTML = renderLoginEstudiante();
                
                document.getElementById('loginEstForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const email = formData.get('email');
                    const password = formData.get('password');
                    
                    if (!loginEstudiante(email, password)) {
                        alert('❌ Credenciales incorrectas. Si no tienes cuenta, regístrate.');
                    }
                });
            });

            btnRegistroEst.addEventListener('click', () => {
                btnRegistroEst.classList.add('border-b-2', 'border-purple-600', 'text-purple-600');
                btnLoginEst.classList.remove('border-b-2', 'border-purple-600', 'text-purple-600');
                btnLoginEst.classList.add('text-gray-600');
                formEstudiante.innerHTML = renderRegistroEstudiante();
                
                document.getElementById('registroEstForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    registrarEstudiante(
                        formData.get('nombre'),
                        formData.get('email'),
                        formData.get('cedula'),
                        formData.get('curso'),
                        formData.get('password')
                    );
                });
            });

            btnLoginEst.click();
        }

        function attachFormDECEEvents() {
            document.getElementById('loginDECEForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const email = formData.get('email');
                const password = formData.get('password');
                
                if (!loginDECE(email, password)) {
                    alert('❌ Credenciales incorrectas para DECE');
                }
            });

            document.getElementById('btnVolverLogin').addEventListener('click', () => {
                document.getElementById('formContainer').innerHTML = '';
            });
        }

        function attachEstudianteEvents() {
            const formTurno = document.getElementById('formTurno');
            if (formTurno) {
                formTurno.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    registrarTurno({
                        nombre: formData.get('nombre'),
                        cedula: formData.get('cedula'),
                        curso: formData.get('curso'),
                        motivo: formData.get('motivo'),
                        situacion: formData.get('situacion')
                    });
                });
            }
        }

        function attachDECEEvents() {
            // Los eventos se manejan con onclick en los botones
        }

        // Funciones globales para botones
        window.cerrarSesion = cerrarSesion;
        window.cambiarDisponibilidad = cambiarDisponibilidad;
        window.eliminarTurno = eliminarTurno;
        
        window.refrescarManual = async () => {
            await cargarDatos();
            render();
        };
        
        window.aceptarTurno = (id) => {
            actualizarEstadoTurno(id, 'aceptado');
        };
        
        window.aceptarTurnoConHora = async (id) => {
            const hora = prompt('Ingrese la hora programada de atención (Ej: 10:30 AM, 14:00):');
            if (hora) {
                try {
                    const actualizado = { 
                        estado: 'aceptado',
                        hora_atencion_programada: hora
                    };
                    const { error } = await supabase.from('turnos').update(actualizado).eq('id', id);
                    if (error) throw error;
                    await cargarDatos();
                    render();
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        };
        
        window.editarHora = async (id, horaActual) => {
            const hora = prompt('Modificar hora de atención:', horaActual);
            if (hora && hora !== horaActual) {
                try {
                    const { error } = await supabase.from('turnos').update({ hora_atencion_programada: hora }).eq('id', id);
                    if (error) throw error;
                    await cargarDatos();
                    render();
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        };
        
        window.rechazarTurno = (id) => {
            const motivo = prompt('Ingrese el motivo del rechazo:');
            if (motivo) {
                actualizarEstadoTurno(id, 'rechazado', motivo);
            }
        };
        
        window.marcarAtendido = (id) => {
            if (confirm('¿Marcar este turno como atendido?')) {
                actualizarEstadoTurno(id, 'atendido');
            }
        };
        
        window.cerrarMiTurno = () => {
            state.miTurno = null;
            render();
        };
        
        window.verMiTurno = async () => {
            const miTurnoId = localStorage.getItem('miTurnoId');
            if (miTurnoId) {
                await cargarDatos();
                const turno = state.turnos.find(t => t.id === parseInt(miTurnoId));
                if (turno) {
                    state.miTurno = turno;
                    render();
                } else {
                    localStorage.removeItem('miTurnoId');
                    alert('Tu turno ya no está disponible');
                    render();
                }
            }
        };
        
        window.volverInicio = () => {
            state.miTurno = null;
            localStorage.removeItem('miTurnoId');
            render();
        };

        // Verificar sesión existente
        function verificarSesion() {
            const sesion = localStorage.getItem('sesion');
            if (sesion) {
                const { tipo, usuario } = JSON.parse(sesion);
                state.tipoUsuario = tipo;
                state.vista = tipo;
                if (tipo === 'estudiante') {
                    state.usuarioActual = usuario;
                    
                    const miTurnoId = localStorage.getItem('miTurnoId');
                    if (miTurnoId) {
                        console.log('Turno guardado encontrado:', miTurnoId);
                    }
                }
            }
        }

        // Auto-refresh cada 5 segundos
        let refreshInterval;
        
        function iniciarAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            
            refreshInterval = setInterval(async () => {
                if (state.configurado) {
                    await cargarDatos();
                    
                    if (state.vista === 'estudiante' && state.miTurno) {
                        render();
                    }
                    else if (state.vista === 'dece') {
                        render();
                    }
                }
            }, 5000);
        }

        // Inicialización
        async function init() {
            await verificarConfiguracion();
            verificarSesion();
            
            if (state.vista !== 'login') {
                await cargarDatos();
                
                if (state.vista === 'estudiante') {
                    const miTurnoId = localStorage.getItem('miTurnoId');
                    if (miTurnoId && state.turnos.length > 0) {
                        const turno = state.turnos.find(t => t.id === parseInt(miTurnoId));
                        if (turno) {
                            state.miTurno = turno;
                        }
                    }
                }
            }
            
            render();
            iniciarAutoRefresh();
        }

        init();
    </script>
</body>
</html>
